<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 212 52" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Icon: bright indigo-violet square -->
  <rect width="52" height="52" rx="13" fill="url(#bg)"/>

  <!-- GO / play triangle -->
  <polygon points="12,15 12,37 27,26" fill="white"/>

  <!-- Thin separator -->
  <rect x="31.5" y="14" width="0.75" height="24" rx="0.375" fill="white" opacity="0.25"/>

  <!-- Cue board rows -->
  <rect x="35" y="16"   width="13" height="3.5" rx="1.75" fill="white"/>
  <rect x="35" y="24.5" width="9"  height="3.5" rx="1.75" fill="white" opacity="0.5"/>
  <rect x="35" y="33"   width="11" height="3.5" rx="1.75" fill="white" opacity="0.25"/>

  <!-- Wordmark -->
  <text
    x="68" y="35"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="20" font-weight="700" fill="#6366f1" letter-spacing="2.5"
  >CUE</text>
  <text
    x="124" y="35"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="20" font-weight="300" fill="#1e1b4b" letter-spacing="2.5"
  >BOARD</text>
</svg>
