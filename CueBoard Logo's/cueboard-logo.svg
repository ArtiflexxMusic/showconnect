<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 212 52" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
  </defs>

  <!-- Icon: deep indigo-violet square -->
  <rect width="52" height="52" rx="13" fill="url(#bg)"/>

  <!-- GO / play triangle — the "cue" trigger -->
  <polygon points="12,15 12,37 27,26" fill="white"/>

  <!-- Thin separator between play and list -->
  <rect x="31.5" y="14" width="0.75" height="24" rx="0.375" fill="white" opacity="0.22"/>

  <!-- Cue board rows — the "board" -->
  <rect x="35" y="16"   width="13" height="3.5" rx="1.75" fill="white"/>
  <rect x="35" y="24.5" width="9"  height="3.5" rx="1.75" fill="white" opacity="0.45"/>
  <rect x="35" y="33"   width="11" height="3.5" rx="1.75" fill="white" opacity="0.2"/>

  <!-- Wordmark: CUE bold + BOARD light, all-caps, tracked -->
  <text
    x="68" y="35"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="20" font-weight="700" fill="#3730a3" letter-spacing="2.5"
  >CUE</text>
  <text
    x="124" y="35"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="20" font-weight="300" fill="#334155" letter-spacing="2.5"
  >BOARD</text>
</svg>
