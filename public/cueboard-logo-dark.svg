<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Icon: cue play symbol inside rounded square -->
  <rect x="0" y="4" width="52" height="52" rx="12" fill="#16a34a"/>
  <!-- Play triangle -->
  <polygon points="18,16 18,44 42,30" fill="white"/>
  <!-- Progress lines (cue board rows) -->
  <rect x="28" y="20" width="14" height="3" rx="1.5" fill="white" opacity="0.5"/>
  <rect x="28" y="27" width="10" height="3" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="28" y="34" width="12" height="3" rx="1.5" fill="white" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="64" y="38" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#111827" letter-spacing="-0.5">Cue</text>
  <text x="105" y="38" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="300" fill="#6b7280" letter-spacing="-0.5">Board</text>
</svg>
